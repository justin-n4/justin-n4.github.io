<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <style>
    .custom-header {
      text-align: center;
      padding: 40px 20px 30px;
    }

    .custom-header h1 {
      margin-bottom: 20px;
      color: #ffffff;
    }

    .profile-photo {
      width: 170px;
      border-radius: 50%;
      margin-top: 10px;
      box-shadow: 0 0 18px rgba(255,255,255,0.20);
      border: 3px solid rgba(255,255,255,0.65);
    }

    .page-wrap {
      max-width: 950px;
      margin: 0 auto 60px;
      background: #ffffff;
      color: #222222;
      padding: 40px 50px 60px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      border-radius: 4px;
    }

    .page-wrap p,
    .page-wrap li {
      color: #333333;
    }

    .page-wrap h1,
    .page-wrap h2,
    .page-wrap h3,
    .page-wrap h4 {
      color: #111111;
    }

    .page-wrap a {
      color: #267cb9;
    }

    @media (max-width: 768px) {
      .page-wrap {
        padding: 25px 20px 40px;
        margin: 0 12px 40px;
      }

      .profile-photo {
        width: 140px;
      }
    }
  </style>
</head>
<body>
  <header class="custom-header">
    <h1>{{ site.title }}</h1>
    <img
      src="{{ '/assets/profile.jpg' | relative_url }}"
      alt="Justin Naimo"
      class="profile-photo"
    >
  </header>

  <main class="page-wrap">
    {{ content }}
  </main>
</body>
</html>
